    username = ""
    username = ${?BITCOIN_NODE_USER}
    password = ""
    password = ${?BITCOIN_NODE_PASSWORD}
    network = "mainnet"
    network = ${?BITCOIN_NETWORK}
  }

  cardano {
    network = "mainnet"
    network = ${?CARDANO_NETWORK}
