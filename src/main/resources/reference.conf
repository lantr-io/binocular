    blockfrost-project-id = ${?BLOCKFROST_PROJECT_ID}
  }

  wallet {
    mnemonic = ""
    mnemonic = ${?WALLET_MNEMONIC}
  }

  oracle {
    tx-out-ref = ""
    tx-out-ref = ${?ORACLE_TX_OUT_REF}
    owner-pkh = ""
    owner-pkh = ${?ORACLE_OWNER_PKH}
    start-height = null
    start-height = ${?ORACLE_START_HEIGHT}
    max-headers-per-tx = 10
    max-headers-per-tx = ${?ORACLE_MAX_HEADERS_PER_TX}
    poll-interval = 1
    poll-interval = ${?ORACLE_POLL_INTERVAL}
