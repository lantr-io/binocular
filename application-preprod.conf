binocular {
  bitcoin-node {
    url = "http://127.0.0.1:48332/"
    username = "bitcoin"
    password = "bitcoin"
    network = "testnet4"
  }

  cardano {
    network = "preprod"
    backend = "blockfrost"
    blockfrost-project-id = ${?BLOCKFROST_PROJECT_ID}
  }

  wallet {
    mnemonic = ${?WALLET_MNEMONIC}
  }

  relay {
    tmtx-policy-id = "eafdc4d9733275d3e06cfe5fe54a13fff3ba5baa8d65636260537907"
    tmtx-asset-name = "TMTx"
    # Relay + confirm-tmtx poll every 10 minutes: new TMs and oracle promotions arrive on
    # Bitcoin-block timescales, so second-level polling only burns Blockfrost requests.
    poll-interval = 600
    retry-interval = 60
    # Dead Unconfirmed-TMs to skip in relay + confirm-tmtx (their signed BTC tx can never be mined,
    # so they linger Unconfirmed at the TM validator and would be re-attempted every poll):
    #  - aa9f3a2f…: the run-dkz treasury handoff (Cardano b9844e3b#0); input 52f26c44:0 was already
    #    spent by the 2026-07-02 peg-in sweep 63c779d7.
    #  - b7d6b5c8…: a stale peg-in sweep (Cardano 4a1f71f6#0) that re-spent deposit 144d3493:0, which
    #    the confirmed tip ab611b1c already swept; superseded by e000fbea. See heimdall auto-skip.
    skip-btc-txids = [
      "aa9f3a2f2942006cb1750724c7ad4db27224e44ea098e98940d6b6d9137f1baf",
      "b7d6b5c8851e7668c33e0641e3af49171fca63b80edceaab43bb5ac21f1c44df"
    ]
  }

  oracle {
    # Re-initialized 2026-07-17: fresh oracle seeding blocks 136600–144450 as confirmed in a
    # single init tx (init --confirmed-until), replacing the previous 9e998abc… oracle that was
    # stuck after a deep testnet4 reorg (its UTxO was already gone on-chain). Confirmed root
    # c0f05d68…97a68fb5, policy 83d66490b8660a266fb663c3362a2ad0da3cb5ad339036305045bb3c, init tx
    # d80499df…, ref-script e812fd90…#0. start-height MUST equal the seeded range start (136600)
    # so off-chain MPF rebuilds walk the same range the confirmed root commits to.
    tx-out-ref = "1c8cb02dd6201c9eb765efab5aa9f78c0f4cea0bd533a923c83d1a6fc6ea9a43#0"
    owner-pkh = "9c87f0a90fcedee0a3b0fbbb6102c8e504b7e0459cf01ee4a31d63ac"
    challenge-aging = 3600
    # 12 = 2x Bitcoin's 6-conf finality convention. Testnet4 min-diff reorg bursts breach any
    # practical depth anyway (observed: ~55 blocks on 2026-07-11, past the previous 40) — deep-
    # reorg recovery is SetState's job now, so this optimizes promotion latency (~2-4h + 1h
    # aging vs ~8-14h at 40). Mainnet keeps 100 (whitepaper).
    maturation-confirmations = 12
    start-height = 136600
    max-headers-per-tx = 40
    closure-timeout = 600
  }
  
  # Bridge redeployed 2026-07-17 against the fresh 1c8cb02d… oracle (policy 83d66490…). Bootstrap
  # tx 97153ce1… mints config + cpi + cpo + tm-control from the shared one-shot e2114589…#1 and
  # registers the peg_in/peg_out reward accounts. Variant B fSAT (delegated mint), peg validators
  # rebound to the new oracle. Script-refs cleared so deploy-script-refs republishes them.
  bridge {
    config-nft-policy-id = "f3ef1414e881dd501a2d25350f6d24c4a2c2cd0f1e5ccfd4d7be143f"
    config-nft-asset-name = "424946434647"
    bridged-token-policy-id = "2c7d729c70de0d2d6f093dfee86f48edbea1dfce167cdeb79ecb8d19"
    bridged-token-asset-name = "66534154"
    completed-peg-ins-one-shot-ref = "e2114589185265fca9572575984049622f28fb6d2850358dde93ccc5ecfc00f9#1"
    tm-control-nft-policy = "690823ae40e8b1bbfab5291a24f5256e25ce18bdc94f1aa0de9f6865"
    tm-control-nft-name = "544d4354524c"
    tm-authorized-minter = "9493315cd92eb5d8c4304e67b7e16ae36d61d34502694657811a2c8e"
    # peg-out side
    completed-peg-outs-one-shot-ref = "e2114589185265fca9572575984049622f28fb6d2850358dde93ccc5ecfc00f9#1"
    # CIP-33 reference scripts are discovered on-chain by script hash (deploy-script-refs publishes
    # them to the sponsor wallet), so no peg-in/bridged-token/completed-peg-*/peg-out script-ref keys.
  }
}