binocular {
  bitcoin-node {
    url = "http://127.0.0.1:48332/"
    username = "bitcoin"
    password = "bitcoin"
    network = "testnet4"
  }

  cardano {
    network = "preprod"
    backend = "blockfrost"
    blockfrost-project-id = ${?BLOCKFROST_PROJECT_ID}
  }

  wallet {
    mnemonic = ${?WALLET_MNEMONIC}
  }

  relay {
    tmtx-policy-id = "eafdc4d9733275d3e06cfe5fe54a13fff3ba5baa8d65636260537907"
    tmtx-asset-name = "TMTx"
    # Relay + confirm-tmtx poll every 10 minutes: new TMs and oracle promotions arrive on
    # Bitcoin-block timescales, so second-level polling only burns Blockfrost requests.
    poll-interval = 600
    retry-interval = 60
    # Dead Unconfirmed-TMs to skip in relay + confirm-tmtx (their signed BTC tx can never be mined,
    # so they linger Unconfirmed at the TM validator and would be re-attempted every poll):
    #  - aa9f3a2f…: the run-dkz treasury handoff (Cardano b9844e3b#0); input 52f26c44:0 was already
    #    spent by the 2026-07-02 peg-in sweep 63c779d7.
    #  - b7d6b5c8…: a stale peg-in sweep (Cardano 4a1f71f6#0) that re-spent deposit 144d3493:0, which
    #    the confirmed tip ab611b1c already swept; superseded by e000fbea. See heimdall auto-skip.
    skip-btc-txids = [
      "aa9f3a2f2942006cb1750724c7ad4db27224e44ea098e98940d6b6d9137f1baf",
      "b7d6b5c8851e7668c33e0641e3af49171fca63b80edceaab43bb5ac21f1c44df"
    ]
  }

  oracle {
    # Re-initialized 2026-07-15 after a ~55-block testnet4 reorg orphaned 15 confirmed blocks of
    # the previous oracle (cd2188fa…, policy 9d2eaf57…, frozen at height 143696). Start height
    # 143681 = the deepest previously-confirmed block still on the canonical chain, so the new
    # confirmed history covers the in-flight TM 74a47f71… (block 143712) with no gap. Init tx
    # 004839886c…, ref-script 77fc15b2…#0.
    tx-out-ref = "9e998abc5f84e522db63e8a3777efbbb99021c28a00bf1e2e7629df03ca5513f#0"
    owner-pkh = "9c87f0a90fcedee0a3b0fbbb6102c8e504b7e0459cf01ee4a31d63ac"
    challenge-aging = 3600
    # 12 = 2x Bitcoin's 6-conf finality convention. Testnet4 min-diff reorg bursts breach any
    # practical depth anyway (observed: ~55 blocks on 2026-07-11, past the previous 40) — deep-
    # reorg recovery is SetState's job now, so this optimizes promotion latency (~2-4h + 1h
    # aging vs ~8-14h at 40). Mainnet keeps 100 (whitepaper).
    maturation-confirmations = 12
    start-height = 143681
    max-headers-per-tx = 40
    closure-timeout = 600
  }
  
  # BIP-322 peg-in bridge redeployed 2026-07-15 against the re-initialized 9e998abc… oracle
  # (the 2026-06-26 bridge died with the reorged 9d2eaf57… oracle). Deploy txs: config e2114589 /
  # cpi f5ee11f8 / cpo 96f10aac / tmctrl 67ec90cd. Peg-out verifier 015c0539 wired (pinned).
  bridge {
    config-nft-policy-id = "3a7547ae3928f91e2b2a4d4fae96acaecbf05f7f6e39b53cdb7f76ee"
    config-nft-asset-name = "424946434647"
    bridged-token-policy-id = "441b777497741654f847ea2cadcadaf847063be96c7c38b359f0093d"
    bridged-token-asset-name = "66425443"
    completed-peg-ins-one-shot-ref = "3f489316a9af11a330e3751bfac569f7a828a9cb46b3cf266d922a32829b4bfb#1"
    tm-control-nft-policy = "97157d613bdc0b90b6f46ad75758e582a3fe9ee0c4cdf34bc3fd2c07"
    tm-control-nft-name = "544d4354524c"
    tm-authorized-minter = "9493315cd92eb5d8c4304e67b7e16ae36d61d34502694657811a2c8e"
    # peg-out side
    completed-peg-outs-one-shot-ref = "77fc15b2cc18bf1b710011772d6d6d3b8d1a3b9a511384de0869a16e67411085#1"
    # script-refs (CIP-33), deployed 2026-07-15
    peg-in-script-ref = "ca6fa8334a24809ef475ac60aa3abcdea5b0279936ea7524b290cb26cca76620#0"
    bridged-token-script-ref = "8a1ed0cb14d0de85c3296db92562423826a08bf280baa436ced556374672786f#0"
    completed-peg-ins-script-ref = "5c0a8b15eadf455f332ecf1ce53b037895e7b8c7ab97ae46fa09347d600f51a8#0"
    peg-out-script-ref = "ed6a58cab53ad9ebe2565c97138136fcb96fdd4d482b6f61d940d5336d8d6a55#0"
    completed-peg-outs-script-ref = "aac0749d0ec1f94b2e6224b7c50d9a51b7349fd09f04fb76bfd6ecbac56e3f92#0"
  }
}